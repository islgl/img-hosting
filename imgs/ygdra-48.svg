<svg width="48" height="48" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
<style>
  .halo     { animation: pulseHalo 3.5s ease-in-out infinite; }
  .core-dot { animation: pulseCore 3s ease-in-out infinite; }
  .leaf     { animation: pulseLeaf 4s ease-in-out infinite; }
  @keyframes pulseCore  { 0%,100%{opacity:0.7} 50%{opacity:1} }
  @keyframes pulseHalo  { 0%,100%{opacity:0.15} 50%{opacity:0.35} }
  @keyframes pulseLeaf  { 0%,100%{opacity:0.6} 50%{opacity:1} }
</style>
<defs>
  <clipPath id="cc4"><circle cx="160" cy="160" r="153"/></clipPath>
  <radialGradient id="bg7" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0e1c30"/><stop offset="100%" stop-color="#050c18"/>
  </radialGradient>
  <filter id="g7"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<circle cx="160" cy="160" r="156" fill="url(#bg7)"/>
<g clip-path="url(#cc4)">
  <path d="M144 226 C112 256 74 280 38 298" stroke="#306aa0" stroke-width="3.5" stroke-linecap="round" opacity="0.6" filter="url(#g7)"/>
  <path d="M176 226 C208 256 246 280 282 298" stroke="#306aa0" stroke-width="3.5" stroke-linecap="round" opacity="0.6" filter="url(#g7)"/>
  <line x1="160" y1="220" x2="160" y2="313" stroke="#3878b0" stroke-width="4" stroke-linecap="round" opacity="0.65" filter="url(#g7)"/>
  <line x1="160" y1="220" x2="160" y2="18" stroke="#a0d8f8" stroke-width="9" stroke-linecap="round" opacity="0.35"/>
  <line x1="160" y1="220" x2="160" y2="18" stroke="#c0e8ff" stroke-width="3" stroke-linecap="round" opacity="0.9" filter="url(#g7)"/>
  <path d="M152 140 C118 114 78 94 40 82"  stroke="#60b8e0" stroke-width="5" stroke-linecap="round" opacity="0.75" filter="url(#g7)"/>
  <path d="M168 140 C202 114 242 94 280 82" stroke="#60b8e0" stroke-width="5" stroke-linecap="round" opacity="0.75" filter="url(#g7)"/>
  <circle cx="40"  cy="82"  r="9"  fill="#70c8f0" filter="url(#g7)" class="leaf"/>
  <circle cx="280" cy="82"  r="9"  fill="#70c8f0" filter="url(#g7)" class="leaf"/>
  <circle cx="160" cy="20"  r="11" fill="#c0e8ff" filter="url(#g7)" class="leaf"/>
  <circle cx="160" cy="170" r="42" fill="#50a8d0" fill-opacity="0.10" class="halo"/>
  <circle cx="160" cy="170" r="26" fill="#060e1c" stroke="#6abce8" stroke-width="2.5" filter="url(#g7)"/>
  <circle cx="160" cy="170" r="12" fill="#c8eeff" filter="url(#g7)" class="core-dot"/>
</g>
<circle cx="160" cy="160" r="154" stroke="#1e4070" stroke-width="1" fill="none"/>
</svg>
