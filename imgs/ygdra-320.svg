<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
<style>
  .halo     { animation: pulseHalo 3.5s ease-in-out infinite; }
  .core-dot { animation: pulseCore 3s ease-in-out infinite; }
  .leaf     { animation: pulseLeaf 4s ease-in-out infinite; }
  .leaf-d   { animation: pulseLeaf 4s ease-in-out infinite 1.3s; }
  .leaf-d2  { animation: pulseLeaf 4s ease-in-out infinite 2.6s; }
  .root-glow{ animation: pulseRoot 4s ease-in-out infinite; }
  .ring1    { transform-origin: 160px 160px; animation: rotateSlow 40s linear infinite; }
  .ring2    { transform-origin: 160px 160px; animation: rotateSlowR 28s linear infinite; }
  @keyframes pulseCore  { 0%,100%{opacity:0.7} 50%{opacity:1} }
  @keyframes pulseHalo  { 0%,100%{opacity:0.15} 50%{opacity:0.35} }
  @keyframes pulseLeaf  { 0%,100%{opacity:0.6} 50%{opacity:1} }
  @keyframes pulseRoot  { 0%,100%{opacity:0.35} 50%{opacity:0.65} }
  @keyframes rotateSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes rotateSlowR{ from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
</style>
